<div>
  <h4 class="mb-1" data-bind="t.title"></h4>
  <p class="text-muted mb-4" data-bind="t.description"></p>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold" data-bind="t.demo"></div>
        <div class="card-body">

          <p class="small fw-semibold mb-1" data-bind="t.userLabel"></p>
          <h5 class="mb-3" data-bind="userName"></h5>
          <div class="input-group mb-4">
            <input class="form-control" type="text"
              data-bind="newName" data-model data-model-event="input" />
            <button class="btn btn-primary" data-click="changeName" data-bind="t.btnChange"></button>
          </div>

          <hr />

          <p class="small fw-semibold mb-1" data-bind="t.visitsLabel"></p>
          <h5 data-bind="visits"></h5>
          <p class="text-muted small mb-0" data-bind="t.visitsHint"></p>

        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold" data-bind="t.code"></div>
        <pre class="bg-dark text-light p-3 rounded-bottom mb-0" style="font-size:.8rem" data-bind="snippet"></pre>
      </div>
    </div>
  </div>
</div>
