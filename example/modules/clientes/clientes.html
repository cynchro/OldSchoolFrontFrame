<section>
  <h2 data-bind="title"></h2>
  <p>Total clientes: <strong data-bind="count"></strong></p>

  <p class="hint" data-bind="loadStatus"></p>

  <input
    type="text"
    data-bind="newClientName"
    data-model
    data-model-event="input"
    placeholder="Nuevo cliente"
  />
  <button data-click="addClient">Agregar local</button>

  <div class="table-wrap">
    <table class="clientes-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
        </tr>
      </thead>
      <tbody id="clientes-table-body"></tbody>
    </table>
  </div>
</section>
